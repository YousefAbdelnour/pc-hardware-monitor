name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    name: release-windows
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Validate release version metadata
        shell: powershell
        run: |
          $packageVersion = (Get-Content frontend/package.json | ConvertFrom-Json).version
          $tauriVersion = (Get-Content frontend/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargoVersionMatch = Get-Content frontend/src-tauri/Cargo.toml | Select-String '^version = "([^"]+)"$' | Select-Object -First 1

          if (-not $cargoVersionMatch) {
            throw "Could not find the Cargo package version."
          }

          $cargoVersion = $cargoVersionMatch.Matches[0].Groups[1].Value

          if ($packageVersion -ne $tauriVersion -or $cargoVersion -ne $tauriVersion) {
            throw "Version mismatch detected. package.json=$packageVersion tauri.conf.json=$tauriVersion Cargo.toml=$cargoVersion"
          }

          if ("v$tauriVersion" -ne $env:GITHUB_REF_NAME) {
            throw "Tag $env:GITHUB_REF_NAME does not match the app version v$tauriVersion."
          }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Build backend sidecar
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-backend.ps1

      - name: Build and publish installer
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: PC Hardware Monitor ${{ github.ref_name }}
          releaseBody: Download the Windows installer from the assets below.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
